<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      margin: 0;
      color: #333;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      padding: 8px 16px;
      background: #18A0FB;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
    }
    button:hover {
      background: #0D8DE2;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      font-size: 12px;
      color: #666;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h2>Antigravity Design</h2>
  <label for="designId">Design ID:</label>
  <input type="text" id="designId" placeholder="Paste ID from web app..." />
  <button id="generateBtn">Generate Design</button>
  <div id="status"></div>

  <script>
    const generateDesign = async (designId) => {
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Fetching design data...';
      document.getElementById('generateBtn').disabled = true;

      try {
        const url = designId 
          ? `http://localhost:3000/api/figma-export/${designId}`
          : `http://localhost:3000/api/figma-export/latest/item`;
          
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error('Design not found or server error');
        }
        
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.error || 'Failed to fetch design');
        }

        if (data.id) {
          document.getElementById('designId').value = data.id;
        }

        statusEl.textContent = 'Generating layout in Figma...';
        
        // Send data to Figma main context
        parent.postMessage({ pluginMessage: { type: 'generate-design', data: data.designData } }, '*');
        
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        document.getElementById('generateBtn').disabled = false;
      }
    };

    document.getElementById('generateBtn').onclick = () => {
      const designId = document.getElementById('designId').value.trim();
      generateDesign(designId);
    };

    // Auto-fetch latest on load
    window.onload = () => {
      generateDesign();
    };

    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'done') {
        document.getElementById('status').textContent = 'Generation complete!';
        document.getElementById('generateBtn').disabled = false;
      } else if (msg.type === 'error') {
        document.getElementById('status').textContent = 'Error: ' + msg.message;
        document.getElementById('generateBtn').disabled = false;
      }
    };
  </script>
</body>
</html>
